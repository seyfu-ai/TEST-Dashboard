<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard RI — ISDEL Energy</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --bg:#07111f; --bg2:#0b1730; --panel:rgba(255,255,255,.075); --panel2:rgba(255,255,255,.105);
      --stroke:rgba(255,255,255,.14); --text:#edf5ff; --muted:#9fb0c7; --accent:#00d4ff; --accent2:#7c3cff;
      --green:#19e68c; --orange:#ff9f1a; --red:#ff3b5c; --blue:#1497ff; --violet:#8b5cf6;
      --shadow:0 20px 60px rgba(0,0,0,.38); --radius:22px;
    }
    *{box-sizing:border-box} html,body{margin:0;min-height:100%;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at top left,#123b68 0,#07111f 32%,#050913 100%);color:var(--text)}
    body:before{content:"";position:fixed;inset:0;background:linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px);background-size:48px 48px;mask-image:linear-gradient(to bottom,rgba(0,0,0,.8),transparent 80%);pointer-events:none}
    .app{position:relative;max-width:1540px;margin:0 auto;padding:24px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:18px 24px;border:1px solid var(--stroke);background:linear-gradient(135deg,rgba(10,24,48,.86),rgba(9,17,34,.66));backdrop-filter:blur(18px);border-radius:26px;box-shadow:var(--shadow)}
    .brand h1{margin:0;font-size:30px;letter-spacing:-.8px}.brand p{margin:5px 0 0;color:var(--muted);font-size:14px}.center-title{font-weight:800;font-size:28px;letter-spacing:-.4px}.logo{font-weight:900;font-size:30px;color:#009fe3;letter-spacing:1px;font-style:italic}
    .upload{margin-top:22px;border:1px dashed rgba(0,212,255,.45);border-radius:26px;background:linear-gradient(135deg,rgba(0,212,255,.09),rgba(124,60,255,.08));padding:24px;display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center}
    .upload.drag{border-color:#fff;box-shadow:0 0 0 4px rgba(0,212,255,.14)}.upload h2{margin:0 0 6px;font-size:22px}.upload p{margin:0;color:var(--muted)}
    .btn{border:0;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;padding:13px 18px;font-weight:800;cursor:pointer;box-shadow:0 12px 30px rgba(0,212,255,.22)} input[type=file]{display:none}
    .notice{margin-top:12px;color:#ffd67a;background:rgba(255,214,122,.08);border:1px solid rgba(255,214,122,.18);padding:12px 14px;border-radius:16px;font-size:13px;display:none}
    .layout{display:grid;grid-template-columns:270px 1fr;gap:22px;margin-top:22px}.sidebar{position:sticky;top:20px;height:max-content;border:1px solid var(--stroke);background:rgba(255,255,255,.07);backdrop-filter:blur(18px);border-radius:28px;padding:18px;box-shadow:var(--shadow)}
    .filter{margin-bottom:14px}.filter label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:0 0 7px;font-weight:800}.filter select,.searchbox{width:100%;background:rgba(4,10,22,.7);border:1px solid var(--stroke);border-radius:14px;color:var(--text);padding:11px 12px;outline:none}.side-kpi{border:1px solid var(--stroke);background:linear-gradient(135deg,rgba(255,255,255,.10),rgba(255,255,255,.05));border-radius:22px;padding:16px;margin-top:18px}.side-kpi span{display:block;color:var(--muted);font-size:12px;font-weight:800;text-transform:uppercase}.side-kpi strong{display:block;font-size:44px;line-height:1.05;margin-top:6px}.side-kpi small{color:var(--muted)}
    .tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}.tab{border:1px solid var(--stroke);background:rgba(255,255,255,.06);color:var(--muted);border-radius:999px;padding:11px 14px;cursor:pointer;font-weight:800}.tab.active{color:#06111f;background:linear-gradient(135deg,var(--accent),#ffffff);border-color:transparent}
    .page{display:none}.page.active{display:block}.grid{display:grid;gap:18px}.kpi-grid{grid-template-columns:repeat(5,minmax(150px,1fr))}.chart-grid{grid-template-columns:repeat(2,minmax(320px,1fr))}.wide-grid{grid-template-columns:1.35fr .85fr}.triple{grid-template-columns:repeat(3,1fr)}
    .card{border:1px solid var(--stroke);background:linear-gradient(135deg,rgba(255,255,255,.105),rgba(255,255,255,.055));backdrop-filter:blur(18px);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);min-width:0}.card h3{margin:0 0 14px;font-size:17px;letter-spacing:-.2px}.kpi{position:relative;overflow:hidden}.kpi:after{content:"";position:absolute;right:-30px;top:-30px;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,255,.24),transparent 70%)}.kpi .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:800}.kpi .value{font-size:38px;font-weight:900;margin-top:8px}.kpi .sub{color:var(--muted);font-size:13px;margin-top:3px}.good{color:var(--green)}.warn{color:var(--orange)}.bad{color:var(--red)}
    .donut-wrap{display:grid;grid-template-columns:240px 1fr;gap:14px;align-items:center}.donut{width:230px;height:230px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--accent) 0 60%,#1d2b45 60% 100%);position:relative}.donut:before{content:"";width:132px;height:132px;background:#0b1730;border-radius:50%;position:absolute;border:1px solid var(--stroke)}.donut strong{position:relative;font-size:28px}.legend{display:grid;gap:9px}.legend div{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px}.dot{width:10px;height:10px;border-radius:50%;display:inline-block}.gauge{height:180px;display:grid;place-items:center;overflow:visible}.gauge svg{width:100%;height:170px;overflow:visible}.gauge .num{font-size:34px;fill:var(--text);font-weight:900;paint-order:stroke;stroke:#101827;stroke-width:3px;stroke-linejoin:round}.gauge .cap{fill:var(--muted);font-size:12px}.gauge .track{stroke:rgba(255,255,255,.13)}.gauge .progress{filter:drop-shadow(0 0 10px rgba(0,212,255,.16))}
    .bar-row{display:grid;grid-template-columns:150px 1fr 48px;gap:10px;align-items:center;margin:10px 0}.bar-label{color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px}.bar-track{height:12px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}.bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2))}.bar-val{text-align:right;color:var(--text);font-weight:800}
    .timeline{height:260px;position:relative;padding:8px 6px 26px}.bars{height:200px;display:flex;align-items:flex-end;gap:4px;border-bottom:1px solid var(--stroke);border-left:1px solid var(--stroke);padding-left:8px}.tbar{flex:1;min-width:5px;background:linear-gradient(to top,var(--blue),var(--accent));border-radius:4px 4px 0 0;position:relative}.tbar.no{background:linear-gradient(to top,var(--red),#ffb3c0)}.xlabels{display:flex;justify-content:space-between;color:var(--muted);font-size:11px;margin-top:8px}.empty{padding:36px;text-align:center;color:var(--muted);border:1px dashed var(--stroke);border-radius:20px}
    table{width:100%;border-collapse:separate;border-spacing:0 8px;font-size:13px}th{text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.07em;padding:6px 10px}td{background:rgba(255,255,255,.055);padding:10px;border-top:1px solid var(--stroke);border-bottom:1px solid var(--stroke)}td:first-child{border-left:1px solid var(--stroke);border-radius:12px 0 0 12px}td:last-child{border-right:1px solid var(--stroke);border-radius:0 12px 12px 0}.pill{display:inline-flex;border-radius:999px;padding:4px 8px;font-weight:800;font-size:12px;background:rgba(255,255,255,.08)}
    @media(max-width:1100px){.layout{grid-template-columns:1fr}.sidebar{position:relative;top:0}.kpi-grid,.chart-grid,.wide-grid,.triple{grid-template-columns:1fr}.topbar{flex-direction:column;align-items:flex-start}.upload{grid-template-columns:1fr}.donut-wrap{grid-template-columns:1fr}.donut{margin:auto}}
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar"><div class="brand"><h1>Remontée d'informations</h1><p>Dashboard RI — lecture locale du fichier Excel</p></div><div class="center-title">ISDEL Energy</div><div class="logo">OMEXOM</div></header>
    <section id="drop" class="upload"><div><h2>Dépose ton fichier Excel ici</h2><p>Le traitement se fait dans le navigateur. Le fichier n’est pas envoyé sur un serveur.</p></div><div><button class="btn" onclick="document.getElementById('file').click()">Importer un fichier .xlsx</button><input id="file" type="file" accept=".xlsx,.xls" /></div></section>
    <div id="notice" class="notice"></div>
    <main class="layout">
      <aside class="sidebar">
        <div class="filter"><label>Entreprise</label><select id="fEntreprise"></select></div>
        <div class="filter"><label>Site</label><select id="fSite"></select></div>
        <div class="filter"><label>Service</label><select id="fService"></select></div>
        <div class="filter"><label>Année</label><select id="fYear"></select></div>
        <div class="filter"><label>Type</label><select id="fType"></select></div>
        <div class="filter"><label>Recherche RI</label><input id="fSearch" class="searchbox" placeholder="Ex : RI-OMM, Cattenom..." /></div>
        <div class="side-kpi"><span>Nombre de RI</span><strong id="sideTotal">0</strong><small id="sideSub">Aucun fichier chargé</small></div>
        <div class="side-kpi"><span>RI positives</span><strong id="sidePositive">0</strong><small>Bonne pratique</small></div>
      </aside>
      <section class="content">
        <nav class="tabs" id="tabs"></nav>
        <div id="pages"></div>
      </section>
    </main>
  </div>
<script>
const state={raw:[],data:[],filters:{},active:'macro'};
const TYPE_COLORS=['#1497ff','#1d2cb0','#19e68c','#ff7a2f','#8b5cf6','#f146a6','#e1bd00','#ff3b5c','#00d4ff','#7c3cff'];
const wantedCols=['NRI','Type','STQualiteSurete','Site','Service','EtatRI','ClassEventRadioPro','GONOGO','DateCreation','DateCloture','ClassEventSecurite','Redacteur','STSecu','Responsabilite','STEnvironnement','ClassEnvironnement','ST Radiopro','Activité','Entreprise'];
function msg(t){const n=document.getElementById('notice');n.style.display=t?'block':'none';n.textContent=t||'';}
function norm(v){return (v??'').toString().trim();}
function key(v){return norm(v).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/\s+/g,' ');}
function parseDate(v){if(!v)return null;if(v instanceof Date&&!isNaN(v))return v;if(typeof v==='number'){return new Date(Math.round((v-25569)*86400*1000));}let s=norm(v).replace(/\./g,'/').replace(/-/g,'/');let m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);if(m){let y=+m[3]; if(y<100)y+=2000; return new Date(y,+m[2]-1,+m[1]);}m=s.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})/);if(m)return new Date(+m[1],+m[2]-1,+m[3]);let d=new Date(v);return isNaN(d)?null:d;}
function fmtDate(d){if(!d)return '';return d.toLocaleDateString('fr-FR');}
function yearOf(d){return d?String(d.getFullYear()):'(Vide)';}
function cleanStatus(v){let s=key(v); if(s.includes('clot'))return 'Clôturée'; if(s.includes('cours'))return 'En cours de traitement'; if(s.includes('traiter'))return 'A traiter'; return norm(v)||'(Vide)';}
function isPositive(r){return key(r.ClassEventSecurite).includes('bonne pratique') || key(r.ClassEventRadioPro).includes('bonne pratique') || key(r.ClassEnvironnement).includes('bonne pratique');}
function normalizeRow(r){let o={}; for(const c of wantedCols)o[c]=norm(r[c]); o.DateObj=parseDate(r.DateCreation); o.Year=yearOf(o.DateObj); o.Status=cleanStatus(o.EtatRI); o.Positive=isPositive(o); o.GoNoGo=key(o.GONOGO).includes('oui')?'OUI':(key(o.GONOGO).includes('non')?'NON':(o.GONOGO||'(Vide)')); return o;}
function unique(data,col){return ['Tout',...Array.from(new Set(data.map(r=>r[col]||'(Vide)'))).sort((a,b)=>a.localeCompare(b,'fr'))];}
function fillSelect(id,vals,keep){let el=document.getElementById(id);let val=keep||el.value||'Tout';el.innerHTML=vals.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');el.value=vals.includes(val)?val:'Tout';}
function esc(s){return norm(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function applyFilters(){let d=[...state.raw];let F={Entreprise:val('fEntreprise'),Site:val('fSite'),Service:val('fService'),Year:val('fYear'),Type:val('fType')};let search=key(document.getElementById('fSearch').value);for(const [c,v] of Object.entries(F)){if(v&&v!=='Tout')d=d.filter(r=>(r[c]||'(Vide)')===v);}if(search)d=d.filter(r=>key(Object.values(r).join(' ')).includes(search));state.data=d;render();}
function val(id){return document.getElementById(id).value;}
function countBy(data,col){let m={}; for(const r of data){let k=r[col]||'(Vide)';m[k]=(m[k]||0)+1;} return Object.entries(m).sort((a,b)=>b[1]-a[1]);}
function countCustom(data,fn){let m={}; for(const r of data){let k=fn(r)||'(Vide)';m[k]=(m[k]||0)+1;} return Object.entries(m).sort((a,b)=>b[1]-a[1]);}
function statusCounts(data){let m={'Clôturée':0,'En cours de traitement':0,'A traiter':0}; for(const r of data){m[r.Status]=(m[r.Status]||0)+1;} return m;}
function tabs(types){let base=[['macro','Vue macro'],['sites','Par site'],['services','Par service']];let typeTabs=types.map(t=>['type:'+t,t]);base.push(...typeTabs,['details','Détails']);return base;}
function renderTabs(types){let t=tabs(types); if(!t.some(x=>x[0]===state.active))state.active='macro';document.getElementById('tabs').innerHTML=t.map(x=>`<button class="tab ${state.active===x[0]?'active':''}" data-tab="${esc(x[0])}">${esc(x[1])}</button>`).join('');document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{state.active=b.dataset.tab;render();});}
function render(){const data=state.data;const total=data.length;const pos=data.filter(r=>r.Positive).length;document.getElementById('sideTotal').textContent=total;document.getElementById('sidePositive').textContent=pos;document.getElementById('sideSub').textContent=state.raw.length?`${state.raw.length} RI chargées au total`:'Aucun fichier chargé';const types=countBy(state.raw,'Type').map(x=>x[0]).filter(x=>x!=='(Vide)');renderTabs(types);let html='';html+=page('macro',macro(data));html+=page('sites',entityPage(data,'Site','Vue par site'));html+=page('services',entityPage(data,'Service','Vue par service'));for(const t of types)html+=page('type:'+t,typePage(data.filter(r=>r.Type===t),t));html+=page('details',details(data));document.getElementById('pages').innerHTML=html;}
function page(id,content){return `<section class="page ${state.active===id?'active':''}">${content}</section>`;}
function kpi(label,value,sub,cls=''){return `<div class="card kpi"><div class="label">${esc(label)}</div><div class="value ${cls}">${esc(value)}</div><div class="sub">${esc(sub||'')}</div></div>`;}
function macro(data){let st=statusCounts(data), total=data.length, pos=data.filter(r=>r.Positive).length, nogo=data.filter(r=>r.GoNoGo==='OUI').length;return `<div class="grid kpi-grid">${kpi('Nombre de RI',total,'sur le périmètre filtré')}${kpi('Clôturées',st['Clôturée']||0,pct(st['Clôturée'],total),'good')}${kpi('En cours',st['En cours de traitement']||0,pct(st['En cours de traitement'],total),'warn')}${kpi('A traiter',st['A traiter']||0,pct(st['A traiter'],total),'bad')}${kpi('RI positives',pos,'Bonne pratique')}</div><div class="grid chart-grid" style="margin-top:18px">${donutCard('Répartition par type',countBy(data,'Type'))}${donutCard('Responsabilité',countBy(data,'Responsabilite'))}</div><div class="grid wide-grid" style="margin-top:18px">${timelineCard('Création des RI dans le temps',data)}${barCard('GO / NO GO',countBy(data,'GoNoGo'))}</div><div class="grid triple" style="margin-top:18px">${gaugeCard('✅ Clôturée',st['Clôturée']||0,total,'var(--green)')}${gaugeCard('⏳ En cours de traitement',st['En cours de traitement']||0,total,'var(--orange)')}${gaugeCard('🚨 A traiter',st['A traiter']||0,total,'var(--red)')}</div>`;}
function entityPage(data,col,title){let top=countBy(data,col).filter(x=>x[0]!=='(Vide)').slice(0,12);return `<div class="grid kpi-grid">${kpi(title,data.length,'RI filtrées')}${kpi('Entités visibles',top.length,'Top affiché')}${kpi('Clôturées',statusCounts(data)['Clôturée']||0,pct(statusCounts(data)['Clôturée'],data.length),'good')}${kpi('NO GO',data.filter(r=>r.GoNoGo==='OUI').length,'Stop chantier','bad')}${kpi('RI positives',data.filter(r=>r.Positive).length,'Bonne pratique')}</div><div class="grid chart-grid" style="margin-top:18px">${barCard('Top '+title,top)}${donutCard('Répartition des statuts',countCustom(data,r=>r.Status))}</div><div class="grid wide-grid" style="margin-top:18px">${timelineCard('Evolution des RI',data)}${barCard('Types principaux',countBy(data,'Type').slice(0,8))}</div>`;}
function typePage(data,type){let st=statusCounts(data);let subCol= type.includes('Qual')||type.includes('Sûr')||type.includes('Sure')?'STQualiteSurete': type.includes('Radio')?'ST Radiopro': type.includes('Sécur')||type.includes('Secur')?'STSecu': type.includes('Environ')?'STEnvironnement':'Activité';let classCol= type.includes('Radio')?'ClassEventRadioPro': type.includes('Sécur')||type.includes('Secur')?'ClassEventSecurite': type.includes('Environ')?'ClassEnvironnement':'STQualiteSurete';return `<div class="grid kpi-grid">${kpi(type,data.length,'RI du type sélectionné')}${kpi('Clôturées',st['Clôturée']||0,pct(st['Clôturée'],data.length),'good')}${kpi('En cours',st['En cours de traitement']||0,pct(st['En cours de traitement'],data.length),'warn')}${kpi('A traiter',st['A traiter']||0,pct(st['A traiter'],data.length),'bad')}${kpi('RI positives',data.filter(r=>r.Positive).length,'Bonne pratique')}</div><div class="grid chart-grid" style="margin-top:18px">${donutCard('% par classification',countBy(data,classCol))}${donutCard('% par sous-thème',countBy(data,subCol))}</div><div class="grid wide-grid" style="margin-top:18px">${timelineCard('Suivi des créations de RI '+type+' avec NO GO',data)}<div class="grid" style="gap:18px">${gaugeCard('✅ Clôturée',st['Clôturée']||0,data.length,'var(--green)')}${gaugeCard('⏳ En cours',st['En cours de traitement']||0,data.length,'var(--orange)')}${gaugeCard('🚨 A traiter',st['A traiter']||0,data.length,'var(--red)')}</div></div>`;}
function details(data){let rows=data.slice(0,160).map(r=>`<tr><td>${esc(r.NRI)}</td><td><span class="pill">${esc(r.Type)}</span></td><td>${esc(r.Entreprise)}</td><td>${esc(r.Site)}</td><td>${esc(r.Service)}</td><td>${esc(fmtDate(r.DateObj))}</td><td>${esc(r.Status)}</td><td>${esc(r.Responsabilite)}</td><td>${esc(r.GoNoGo)}</td></tr>`).join('');return `<div class="card"><h3>Données filtrées</h3><p style="color:var(--muted);margin-top:-6px">Affichage limité aux 160 premières lignes pour garder la page fluide.</p><table><thead><tr><th>NRI</th><th>Type</th><th>Entreprise</th><th>Site</th><th>Service</th><th>Date</th><th>Etat</th><th>Responsabilité</th><th>GO/NO GO</th></tr></thead><tbody>${rows||'<tr><td colspan="9">Aucune donnée</td></tr>'}</tbody></table></div>`;}
function pct(v,t){return t?`${Math.round((v||0)*1000/t)/10}%`:'0%';}
function donutCard(title,items){let total=items.reduce((s,x)=>s+x[1],0); if(!total)return `<div class="card"><h3>${esc(title)}</h3><div class="empty">Aucune donnée</div></div>`;let angle=0, segs=[];items.slice(0,9).forEach((it,i)=>{let deg=it[1]/total*360;segs.push(`${TYPE_COLORS[i%TYPE_COLORS.length]} ${angle}deg ${angle+deg}deg`);angle+=deg;}); if(angle<360)segs.push(`#1d2b45 ${angle}deg 360deg`);let leg=items.slice(0,9).map((it,i)=>`<div><span class="dot" style="background:${TYPE_COLORS[i%TYPE_COLORS.length]}"></span><span>${esc(it[0])}</span><b style="margin-left:auto;color:var(--text)">${it[1]} · ${pct(it[1],total)}</b></div>`).join('');return `<div class="card"><h3>${esc(title)}</h3><div class="donut-wrap"><div class="donut" style="background:conic-gradient(${segs.join(',')})"><strong>${total}</strong></div><div class="legend">${leg}</div></div></div>`;}
function barCard(title,items){let max=Math.max(1,...items.map(x=>x[1]));let rows=items.slice(0,12).map(x=>`<div class="bar-row"><div class="bar-label" title="${esc(x[0])}">${esc(x[0])}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(2,x[1]/max*100)}%"></div></div><div class="bar-val">${x[1]}</div></div>`).join('');return `<div class="card"><h3>${esc(title)}</h3>${rows||'<div class="empty">Aucune donnée</div>'}</div>`;}
function gaugeCard(title,value,total,color){let p=total?Math.max(0,Math.min(1,value/total)):0;let dash=Math.round(p*1000)/10;return `<div class="card"><h3>${esc(title)}</h3><div class="gauge"><svg viewBox="0 0 200 135" aria-label="${esc(title)} : ${value} sur ${total}"><path class="track" d="M 30 100 A 70 70 0 0 1 170 100" fill="none" stroke-width="24" stroke-linecap="butt" pathLength="100"/><path class="progress" d="M 30 100 A 70 70 0 0 1 170 100" fill="none" stroke="${color}" stroke-width="24" stroke-linecap="butt" pathLength="100" stroke-dasharray="${dash} 100"/><text x="100" y="86" text-anchor="middle" class="num">${value}</text><text x="30" y="124" class="cap">0</text><text x="170" y="124" text-anchor="end" class="cap">${total}</text></svg></div></div>`;}
function polar(cx,cy,r,a){let rad=(a-90)*Math.PI/180;return {x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)}}
function describeArc(x,y,r,start,end){let s=polar(x,y,r,end),e=polar(x,y,r,start),large=Math.abs(end-start)<=180?'0':'1';return `M ${s.x} ${s.y} A ${r} ${r} 0 ${large} 0 ${e.x} ${e.y}`;}
function timelineCard(title,data){let by={}; for(const r of data){if(!r.DateObj)continue;let k=r.DateObj.toISOString().slice(0,10);if(!by[k])by[k]={total:0,nogo:0,date:r.DateObj};by[k].total++;if(r.GoNoGo==='OUI')by[k].nogo++;}let arr=Object.entries(by).sort((a,b)=>a[0].localeCompare(b[0])); if(arr.length>55){let step=Math.ceil(arr.length/55);let grouped=[];for(let i=0;i<arr.length;i+=step){let slice=arr.slice(i,i+step), t=slice.reduce((s,x)=>s+x[1].total,0), n=slice.reduce((s,x)=>s+x[1].nogo,0);grouped.push([slice[0][0],{total:t,nogo:n,date:slice[0][1].date}]);}arr=grouped;}let max=Math.max(1,...arr.map(x=>x[1].total));let bars=arr.map(x=>`<div class="tbar ${x[1].nogo?'no':''}" title="${fmtDate(x[1].date)} : ${x[1].total} RI${x[1].nogo?' / '+x[1].nogo+' NO GO':''}" style="height:${Math.max(4,x[1].total/max*190)}px"></div>`).join('');let labels=arr.length?`<div class="xlabels"><span>${fmtDate(arr[0][1].date)}</span><span>${fmtDate(arr[arr.length-1][1].date)}</span></div>`:'';return `<div class="card"><h3>${esc(title)}</h3><div class="timeline"><div class="bars">${bars||'<div class="empty" style="width:100%">Aucune date exploitable</div>'}</div>${labels}</div></div>`;}
function refreshFilterOptions(){fillSelect('fEntreprise',unique(state.raw,'Entreprise'));fillSelect('fSite',unique(state.raw,'Site'));fillSelect('fService',unique(state.raw,'Service'));fillSelect('fYear',unique(state.raw,'Year'));fillSelect('fType',unique(state.raw,'Type'));}
async function handleFile(file){try{msg('Chargement du fichier...');if(!window.XLSX){msg('La bibliothèque XLSX n’est pas chargée. Vérifie l’accès internet/CDN ou utilise une version avec bibliothèque locale.');return;}const buf=await file.arrayBuffer();const wb=XLSX.read(buf,{type:'array',cellDates:true});const sheet=wb.Sheets[wb.SheetNames[0]];let rows=XLSX.utils.sheet_to_json(sheet,{defval:'',raw:false});if(!rows.length){msg('Le fichier est vide ou la première feuille ne contient pas de tableau.');return;}state.raw=rows.map(normalizeRow).filter(r=>r.NRI||r.Type||r.Site||r.Entreprise);refreshFilterOptions();msg(`Fichier chargé : ${state.raw.length} lignes détectées. Les filtres et pages sont prêts.`);applyFilters();}catch(e){console.error(e);msg('Erreur de lecture : '+e.message);}}
document.getElementById('file').addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0]);});['fEntreprise','fSite','fService','fYear','fType','fSearch'].forEach(id=>document.getElementById(id).addEventListener(id==='fSearch'?'input':'change',applyFilters));
const drop=document.getElementById('drop');['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('drag')}));['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('drag')}));drop.addEventListener('drop',e=>{const f=e.dataTransfer.files[0]; if(f)handleFile(f);});
refreshFilterOptions();render();
</script>
